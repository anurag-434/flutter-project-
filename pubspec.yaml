name: stethoscope_app
description: "Digital Stethoscope App for Heart & Lung Sound Analysis"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  provider: ^6.1.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0
  path_provider: ^2.1.1
  share_plus: ^7.2.1
  permission_handler: ^11.1.0
  fl_chart: ^0.65.0
  uuid: ^4.2.1
  intl: ^0.19.0
  pdf: ^3.10.7
  printing: ^5.12.0
  flutter_sound: ^9.2.13
  audio_session: ^0.1.18
  animate_do: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/images/
    - assets/models/
    - assets/sounds/
